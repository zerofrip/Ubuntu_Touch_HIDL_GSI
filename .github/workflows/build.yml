name: Build Ubuntu GSI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0) — leave empty to skip release creation'
        required: false
        default: ''

jobs:
  lint:
    name: ShellCheck Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          find . -name '*.sh' \
            -not -path './third_party/*' \
            -not -path './builder/out/*' \
            -print0 | xargs -0 shellcheck --severity=warning

  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            squashfs-tools \
            e2fsprogs \
            jq \
            debootstrap \
            qemu-user-static

      - name: Build rootfs with packages.list
        run: |
          chmod +x scripts/build_rootfs.sh
          sudo bash scripts/build_rootfs.sh

      - name: Build system.img
        run: |
          chmod +x build.sh builder/scripts/*.sh scripts/*.sh
          # Run build.sh but skip the download phase (rootfs already staged)
          # sudo required: build_rootfs.sh creates root-owned rootfs
          sudo ROOTFS_TARBALL_NAME="SKIP" bash build.sh

      - name: Verify artifacts
        run: |
          echo "=== Build Artifacts ==="
          ls -lh builder/out/system.img || echo "system.img missing"
          ls -lh builder/out/linux_rootfs.squashfs || echo "squashfs missing"
          ls -lh builder/out/userdata.img || echo "userdata.img missing"

      - name: Upload workflow artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: ubuntu-gsi-${{ github.run_number }}
          path: |
            builder/out/system.img
            builder/out/linux_rootfs.squashfs
            builder/out/userdata.img
          retention-days: ${{ startsWith(github.ref, 'refs/tags/') && 90 || 7 }}
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}
          name: Ubuntu GSI ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}
          body: |
            ## Ubuntu GSI ${{ github.ref_name }}

            ### Artifacts
            | File | Description |
            |------|-------------|
            | `system.img` | Flash to `system` partition via fastboot |
            | `linux_rootfs.squashfs` | Ubuntu root filesystem (included in userdata.img) |
            | `userdata.img` | Flash to `userdata` partition via fastboot (auto-expands on first boot) |

            ### Flash instructions
            ```sh
            fastboot flash system system.img
            fastboot flash userdata userdata.img
            fastboot reboot
            ```
          files: |
            builder/out/system.img
            builder/out/linux_rootfs.squashfs
            builder/out/userdata.img
          draft: false
          prerelease: ${{ contains(startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag, '-') }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
