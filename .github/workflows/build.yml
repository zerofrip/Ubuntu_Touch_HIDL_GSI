name: Build Ubuntu GSI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0) — leave empty to skip release creation'
        required: false
        default: ''

jobs:
  lint:
    name: ShellCheck Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          find . -name '*.sh' \
            -not -path './third_party/*' \
            -not -path './builder/out/*' \
            -not -path './builder/cache/*' \
            -not -path './deprecated/*' \
            -print0 | xargs -0 shellcheck --severity=warning

  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CI: "true"
      GSI_CI_MINIMAL_PACKAGES: "1"
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            e2fsprogs \
            erofs-utils \
            jq \
            debootstrap \
            qemu-user-static \
            wget \
            unzip \
            xz-utils \
            android-sdk-libsparse-utils

      - name: Build images
        run: |
          chmod +x build.sh scripts/*.sh
          sudo -E bash build.sh

      - name: Verify artifacts
        run: |
          echo "=== Build Artifacts ==="
          ls -lh builder/out/system.img
          ls -lh builder/out/linux_rootfs.erofs
          ls -lh builder/out/vbmeta-disabled.img

      - name: Upload workflow artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: ubuntu-gsi-${{ github.run_number }}
          path: |
            builder/out/system.img
            builder/out/linux_rootfs.erofs
            builder/out/vbmeta-disabled.img
          retention-days: ${{ startsWith(github.ref, 'refs/tags/') && 90 || 7 }}
          if-no-files-found: error

      - name: Prepare release asset list (skip files >= 2GB)
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
        id: release_assets
        run: |
          max_size=2147483647
          assets=""
          for f in builder/out/system.img builder/out/linux_rootfs.erofs builder/out/vbmeta-disabled.img; do
            if [ -f "$f" ]; then
              size=$(stat -c%s "$f")
              if [ "$size" -le "$max_size" ]; then
                assets="${assets}${f}\n"
              else
                echo "Skipping $f ($size bytes) because GitHub release asset limit is 2GB"
              fi
            fi
          done
          {
            echo "files<<EOF"
            printf "%b" "$assets"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}
          name: Ubuntu GSI ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}
          body: |
            ## Ubuntu GSI ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}

            ### Artifacts
            | File | Description |
            |------|-------------|
            | `system.img` | Flash to `system` partition via fastboot |
            | `linux_rootfs.erofs` | Ubuntu chroot rootfs payload embedded by system overlay |
            | `vbmeta-disabled.img` | Flash to `vbmeta` with verity disabled |

            Note: GitHub release assets larger than 2GB are automatically skipped.
            Use workflow artifacts for full-size files when needed.

            ### Flash instructions
            ```sh
            fastboot --disable-verity --disable-verification flash vbmeta vbmeta-disabled.img
            fastboot flash system system.img
            fastboot reboot
            ```
          files: ${{ steps.release_assets.outputs.files }}
          draft: false
          prerelease: ${{ contains(startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag, '-') }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
