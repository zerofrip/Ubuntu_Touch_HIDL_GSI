# =============================================================================
# logind.conf.d/00-ubuntu-gsi.conf — Power/Volume/Lid Button Policy
# =============================================================================
# Configures systemd-logind to handle hardware buttons appropriately
# on Android Treble devices running Ubuntu GSI.
#
# - Short press power button → suspend (screen off)
# - Long press power button → power off (via inhibitor if Lomiri running)
# - Lid switch (hall sensor) → suspend
# =============================================================================

[Login]
HandlePowerKey=suspend
HandlePowerKeyLongPress=poweroff
HandleSuspendKey=suspend
HandleHibernateKey=ignore
HandleLidSwitch=suspend
HandleLidSwitchExternalPower=suspend
HandleLidSwitchDocked=ignore
IdleAction=ignore
